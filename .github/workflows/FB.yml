name: FB Download

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2 curl jq
          python3 -m pip install -U yt-dlp

      - name: Get Video Link From Page
        id: getlink
        run: |
          PAGE_URL="https://ssplay.net/yan.php?link=https://yanhh3d.sh/play-fb-v8/play/${{ github.event.inputs.link }}"
          echo "[PAGE] $PAGE_URL"

          curl -L "$PAGE_URL" -o page.html

          VIDEO_URL=$(grep -oP 'var cccc = "\K[^"]+' page.html)

          if [ -z "$VIDEO_URL" ]; then
            echo "Cannot find video url"
            exit 1
          fi

          echo "[VIDEO] $VIDEO_URL"

          echo "VIDEO_URL=$VIDEO_URL" >> $GITHUB_ENV

      - name: Download Video
        run: |
          NAME="${{ github.event.inputs.slug }}"
          curl -L "$VIDEO_URL" -o "${NAME}.mp4"

          if [ ! -f "${NAME}.mp4" ]; then
            echo "Download failed"
            exit 1
          fi

      - name: Convert to HLS fMP4 (Segments as PNG)
        run: |
          mkdir -p output
          NAME="${{ github.event.inputs.slug }}"

          ffmpeg -i "${NAME}.mp4" \
            -map 0:v:0 -map 0:a? \
            -c:v copy \
            -c:a copy \
            -f hls \
            -start_number 10001 \
            -hls_time 5 \
            -hls_list_size 0 \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${NAME}-index.png" \
            -hls_segment_filename "output/${NAME}-index%d.png" \
            "output/${NAME}.m3u8"

          if [ ! -f "output/${NAME}.m3u8" ]; then
            echo "FFmpeg failed to create m3u8"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment (branch domain check)
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          FILE_URL="https://${{ github.event.inputs.slug }}.${{ github.event.inputs.page }}.pages.dev/${{ github.event.inputs.slug }}.m3u8"

          echo "[TARGET] $FILE_URL"

          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            echo "HTTP CODE: $code"
            [ "$code" = "200" ]
          }

          echo "[WAIT] Waiting 1 minutes for Pages propagation..."
          sleep 60

          echo "[CHECK #1]"
          if check; then
            echo "[SUCCESS] File exists"
            curl -G "https://cp.ssplay.net/cf.php" \
            --data-urlencode "type=ok" \
            --data-urlencode "key=${{ github.event.inputs.page }}" \
            --data-urlencode "slug=${{ github.event.inputs.slug }}"
            exit 0
          fi

          echo "[WAIT] Still not found, wait extra 3 minutes..."
          sleep 180

          echo "[CHECK #2]"
          if check; then
            echo "[SUCCESS] File exists after delay"
            exit 0
          fi

          echo "[FAIL] File still missing → mark for redeploy"
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages (retry – reuse encoded files)
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
