name: Video to M3U8 and Deploy

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link video cần tải'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download video
        run: |
          # 1. Lấy Base URL (cắt bỏ phần tên file m3u8 và query đằng sau)
          # Kết quả sẽ có dạng: https://bbz.hh3dtv.cc/file/012478b95a18/
          BASE_URL=$(echo "${{ github.event.inputs.link }}" | sed 's/\/[^\/]*\.m3u8.*$/\//')
          
          # 2. Lấy Authorization token (phần sau dấu ?)
          AUTH_TOKEN=$(echo "${{ github.event.inputs.link }}" | cut -d'?' -f2)
          
          # 3. Tải m3u8 về
          curl -L "${{ github.event.inputs.link }}" -o playlist_original.m3u8
          
          # 4. Sửa file m3u8: 
          # Thay thế "tên_file.html" thành "https://domain.com/.../tên_file.html?Authorization=..."
          # Dùng dấu | làm phân cách cho sed để tránh xung đột với dấu / trong URL
          sed "s|LKT-VS-[0-9]*.html|${BASE_URL}&?${AUTH_TOKEN}|g" playlist_original.m3u8 > playlist_fixed.m3u8
          
          # Kiểm tra nội dung file đã sửa (optional - để debug nếu cần)
          head -n 20 playlist_fixed.m3u8
          
          # 5. Chạy FFmpeg
          ffmpeg -protocol_whitelist file,http,https,tcp,tls,crypto \
                 -allowed_extensions ALL \
                 -i playlist_fixed.m3u8 \
                 -c copy -bsf:a aac_adtstoasc "${{ github.event.inputs.slug }}.mp4"
      
      - name: Convert to HLS (.m3u8 fMP4)
        run: |
          mkdir -p output
          INPUT="${{ github.event.inputs.slug }}.mp4"

          ffmpeg -loglevel error -y -i "$INPUT" \
            -map 0:v:0 \
            -map 0:a? \
            -c:v copy \
            -c:a aac -profile:a aac_low -ar 48000 -ac 2 -b:a 96k -bsf:a aac_adtstoasc \
            -start_number 10001 \
            -hls_time 4 \
            -hls_list_size 0 \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${{ github.event.inputs.slug }}-index.png" \
            -hls_segment_filename "output/${{ github.event.inputs.slug }}-index%d.png" \
            -f hls "output/${{ github.event.inputs.slug }}.m3u8"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

            
      - name: Verify Cloudflare deployment (branch domain check)
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          FILE_URL="https://${{ github.event.inputs.slug }}.${{ github.event.inputs.page }}.pages.dev/${{ github.event.inputs.slug }}.m3u8"

          echo "[TARGET] $FILE_URL"

          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            echo "HTTP CODE: $code"
            [ "$code" = "200" ]
          }

          echo "[WAIT] Waiting 1 minutes for Pages propagation..."
          sleep 60

          echo "[CHECK #1]"
          if check; then
            echo "[SUCCESS] File exists"
            curl -G "https://cp.ssplay.net/cf.php" \
            --data-urlencode "type=ok" \
            --data-urlencode "key=${{ github.event.inputs.page }}" \
            --data-urlencode "slug=${{ github.event.inputs.slug }}"
            exit 0
          fi

          echo "[WAIT] Still not found, wait extra 3 minutes..."
          sleep 180

          echo "[CHECK #2]"
          if check; then
            echo "[SUCCESS] File exists after delay"
            exit 0
          fi

          echo "[FAIL] File still missing → mark for redeploy"
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages (retry – reuse encoded files)
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
