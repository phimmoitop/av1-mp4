name: M3U8 --> Deploy

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'URL'
        required: true
      name:
        description: 'slug'
        required: true
      token:
        description: 'Token'
        required: true
      projectName:
        description: 'Pages'
        required: true
      accountId:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install -y ffmpeg curl jq

      - name: Download m3u8 manually
        run: |
          URL="${{ inputs.link }}"
          # Lấy domain từ link để làm Referer
          DOMAIN=$(echo "$URL" | awk -F[/:] '{print $1"//"$4}')
          
          echo "Downloading playlist from $DOMAIN..."
          
          # 1. Tải file m3u8 về
          curl -L "$URL" \
            -H "Referer: $DOMAIN/" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -o playlist.m3u8

          # 2. Bóc tách các link .ts (xử lý cả link tương đối và tuyệt đối)
          # Lưu danh sách vào file để ffmpeg ghép sau này
          BASE_URL=$(echo "$URL" | rev | cut -d'/' -f2- | rev)
          grep -E "\.ts" playlist.m3u8 | while read -r line; do
            if [[ "$line" == http* ]]; then
              echo "$line" >> segment_list.txt
            else
              echo "$BASE_URL/$line" >> segment_list.txt
            fi
          done

          # 3. Tải từng phân đoạn với Referer
          mkdir -p segments
          i=0
          while read -r segment_url; do
            printf -v filename "segments/%05d.ts" $i
            echo "Downloading $filename..."
            curl -L "$segment_url" \
              -H "Referer: $DOMAIN/" \
              --retry 3 \
              -o "$filename"
            echo "file '$filename'" >> concat_list.txt
            ((i++))
          done < segment_list.txt

          # 4. Dùng FFmpeg để ghép các file .ts đã tải thành mp4
          ffmpeg -f concat -safe 0 -i concat_list.txt -c copy "input_video.mp4"

      - name: Convert to HLS fMP4 (Segments as PNG)
        run: |
          mkdir -p output
          NAME="${{ github.event.inputs.name }}"
          
          # Giải thích các tham số FFmpeg:
          # -map 0:v:0 -map 0:a? : Lấy video đầu tiên, lấy audio nếu có (không lỗi nếu ko có audio)
          # -c:v copy : Giữ nguyên bitrate/chất lượng video (không encode lại - cực nhanh)
          # -hls_fmp4_init_filename : Đặt tên file init (quan trọng nhất của fMP4) thành .png
          # -hls_segment_filename : Đặt tên các mảnh segment thành .png
          
          ffmpeg -i input_video.mp4 \
            -map 0:v:0 -map 0:a? \
            -c:v copy \
            -c:a aac -b:a 128k \
            -f hls \
            -start_number 10001 \
            -hls_time 6 \
            -hls_list_size 0 \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${NAME}-index.png" \
            -hls_segment_filename "output/${NAME}-index%d.png" \
            "output/${NAME}.m3u8"
          
          # Kiểm tra xem file m3u8 có được tạo không
          if [ ! -f "output/${NAME}.m3u8" ]; then
            echo "FFmpeg failed to create m3u8"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.accountId }}
          projectName: ${{ github.event.inputs.projectName }}
          directory: ./output
          branch: ${{ github.event.inputs.name }}

      - name: Callback status
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            TYPE="ok"
          else
            TYPE="error"
          fi
          curl -G "https://cp.ssplay.net/cf.php" \
            --data-urlencode "type=$TYPE" \
            --data-urlencode "key=${{ github.event.inputs.projectName }}" \
            --data-urlencode "slug=${{ github.event.inputs.name }}"
